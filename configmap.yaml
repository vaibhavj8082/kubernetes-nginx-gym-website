data:
  index.html: "<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\"
    content=\"width=device-width, initial-scale=1.0\">\n<title>PowerFit Gym</title>\n\n<style>\n*{\n
    \   margin:0;\n    padding:0;\n    box-sizing:border-box;\n    font-family:Arial,
    sans-serif;\n}\n\nbody{\n    background:#111;\n    color:white;\n}\n\nheader{\n
    \   height:100vh;\n    background:\n    linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.7)),\n
    \   url(\"https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1600&q=80\");\n
    \   background-size:cover;\n    background-position:center;\n\n    display:flex;\n
    \   align-items:center;\n    justify-content:center;\n    text-align:center;\n}\n\n.hero
    h1{\n    font-size:70px;\n}\n\n.hero p{\n    margin-top:20px;\n    font-size:22px;\n}\n\n.btn{\n
    \   display:inline-block;\n    margin-top:30px;\n    padding:15px 40px;\n    background:#ff4d00;\n
    \   color:white;\n    text-decoration:none;\n    border-radius:30px;\n}\n\n.section{\n
    \   padding:80px 10%;\n}\n\n.cards{\n    display:grid;\n    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));\n
    \   gap:20px;\n}\n\n.card{\n    background:#1b1b1b;\n    padding:30px;\n    border-radius:15px;\n}\n\n.card
    h3{\n    color:#ff4d00;\n    margin-bottom:15px;\n}\n\nfooter{\n    background:black;\n
    \   text-align:center;\n    padding:30px;\n}\n</style>\n</head>\n\n<body>\n\n<header>\n<div
    class=\"hero\">\n<h1>POWERFIT GYM</h1>\n<p>Build Strength • Burn Fat • Stay Healthy</p>\n\n<a
    href=\"#plans\" class=\"btn\">\nJoin Today\n</a>\n</div>\n</header>\n\n<section
    class=\"section\">\n<h2 style=\"text-align:center;margin-bottom:40px\">\nWhy Choose
    Us\n</h2>\n\n<div class=\"cards\">\n\n<div class=\"card\">\n<h3>\U0001F3CB Premium
    Equipment</h3>\n<p>Modern machines and free weights.</p>\n</div>\n\n<div class=\"card\">\n<h3>\U0001F4AA
    Expert Trainers</h3>\n<p>Personal coaching to reach your goals.</p>\n</div>\n\n<div
    class=\"card\">\n<h3>\U0001F525 Fat Loss Programs</h3>\n<p>Structured workouts
    and nutrition guidance.</p>\n</div>\n\n</div>\n</section>\n\n<section class=\"section\"
    id=\"plans\">\n\n<h2 style=\"text-align:center;margin-bottom:40px\">\nMembership
    Plans\n</h2>\n\n<div class=\"cards\">\n\n<div class=\"card\">\n<h3>Basic</h3>\n<p>₹999
    / month</p>\n</div>\n\n<div class=\"card\">\n<h3>Premium</h3>\n<p>₹1999 / month</p>\n</div>\n\n<div
    class=\"card\">\n<h3>Elite</h3>\n<p>₹2999 / month</p>\n</div>\n\n</div>\n\n</section>\n\n<footer>\n<p>©
    2026 PowerFit Gym | Transform Your Body</p>\n</footer>\n\n</body>\n</html>\n"
